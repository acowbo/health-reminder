# Automatically build and publish releases for macOS and Windows
# Triggered when a version tag (e.g. v0.1.0) is pushed

name: Release

on:
  push:
    tags:
      - 'v*'

# Required for creating releases
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Windows: install required system dependencies for Tauri
      - name: Install Windows dependencies
        if: matrix.platform == 'windows-latest'
        run: |
          # Install WebView2 (usually pre-installed on GitHub Actions Windows runners)
          # Install Visual Studio Build Tools if needed
          echo "Windows dependencies ready"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '健康提醒 ${{ github.ref_name }}'
          releaseBody: '请前往 Assets 下载对应平台的安装包。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
